name: PermitIQ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Frontend — Lint & Build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Backend — Lint & Unit Tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Lint & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with Ruff
        run: ruff check app/ tests/ --output-format=github
        continue-on-error: true

      # Only run unit tests (compliance_scenarios).
      # test_backend_smoke.py is an integration test that requires
      # a live backend server and is excluded from CI.
      - name: Run unit tests
        run: pytest tests/test_compliance_scenarios.py -v --tb=short
        env:
          ENVIRONMENT: ci
          PYTHONPATH: ${{ github.workspace }}